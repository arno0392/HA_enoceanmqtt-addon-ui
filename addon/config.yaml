---
name: "EnOcean MQTT UI Fork"
version: "1.3.4"
slug: "enocean-mqtt-ui"
description: "Fork All-in-One EnOcean to MQTT bridge with web UI. Configure devices visually, create custom EEP profiles, and manage MQTT mappings - no config files needed!"
url: "https://github.com/arno0392/HA_enoceanmqtt-addon-ui"
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
init: false
uart: true
ingress: true
ingress_port: 8099
panel_icon: mdi:radio-tower
panel_title: "EnOcean"
homeassistant_api: true
hassio_api: true
services:
  - mqtt:need
map:
  - config:rw
  - share:rw

options:
  serial_port: ""
  tcp_port: ""
  log_level: "info"
  cache_device_states: true
  mqtt:
    mqtt_host: "core-mosquitto"
    mqtt_port: 1883
    mqtt_user: ""
    mqtt_pwd: ""
    discovery_prefix: "homeassistant"
    prefix: "enoceanmqtt"
    client_id: "enocean_gateway"

schema:
  serial_port: "device(subsystem=tty)?"
  tcp_port: "str?"
  log_level: "list(debug|info|warning|error)"
  cache_device_states: "bool"
  mqtt:
    mqtt_host: "str"
    mqtt_port: "int"
    mqtt_user: "str"
    mqtt_pwd: "password"
    discovery_prefix: "str"
    prefix: "str"
    client_id: "str"
